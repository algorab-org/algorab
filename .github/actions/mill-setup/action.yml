name: Setup repo, Java, caches & Mill

runs:
  using: composite
  steps:
    - uses: actions/setup-java@v4
      with:
        distribution: temurin
        java-version: 21

    - name: Cache Mill, Ivy & sbt
      uses: actions/cache@v4
      with:
        path: |
          ~/.mill
          ~/.ivy2/cache
          !~/.ivy2/cache/**/ivydata-*.properties
          ~/.ivy2/local
        key: ${{ runner.os }}-${{ hashFiles('build.mill') }}
        restore-keys: |
          ${{ runner.os }}-

    - name: Cache Mill build outputs (between jobs)
      uses: actions/cache@v4
      with:
        path: out
        key: ${{ runner.os }}-${{ github.run_id }}
